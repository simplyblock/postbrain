replicaCount: 1

image:
  repository: simplyblock/postbrain
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 7433

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: postbrain.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

certificate:
  enabled: false
  name: ""
  labels: {}
  secretName: "postbrain-cert-secret"
  privateKey:
    rotationPolicy: Always
  issuerRef:
    name: "letsencrypt-dns"
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames: []

httpRoute:
  enabled: false
  parentRefs: []
  hostnames: []
  pathPrefix: /

gateway:
  enabled: false
  name: ""
  labels: {}
  annotations: {}
  gatewayClassName: ""
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: ""
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: ""
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: "postbrain-cert-secret"
            kind: Secret

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []

config:
  database:
    url: "postgres://postbrain:postbrain@postgres:5432/postbrain"
    auto_migrate: true
    max_open: 25
    max_idle: 5
    connect_timeout: "10s"

  embedding:
    providers:
      default:
        backend: "ollama"
        service_url: "http://ollama:11434"
        api_key: ""
        text_model: "nomic-embed-text"
        code_model: "nomic-embed-code"
        summary_model: ""
    request_timeout: "30s"
    batch_size: 64

  server:
    addr: ":7433"
    tls_cert: ""
    tls_key: ""

  migrations:
    expected_version: 0

  jobs:
    consolidation_enabled: true
    contradiction_enabled: true
    reembed_enabled: true
    age_check_enabled: true
    backfill_summaries_enabled: true
    chunk_backfill_enabled: false

  oauth:
    base_url: "https://postbrain.example.com"
    providers:
      github:
        enabled: false
        client_id: ""
        client_secret: ""
        scopes: ["read:user", "user:email"]
      google:
        enabled: false
        client_id: ""
        client_secret: ""
        scopes: ["openid", "email", "profile"]
      gitlab:
        enabled: false
        client_id: ""
        client_secret: ""
        instance_url: "https://gitlab.com"
        scopes: ["read_user"]
    server:
      auth_code_ttl: "10m"
      state_ttl: "15m"
      token_ttl: "0"
      dynamic_registration: true
    social:
      auto_create_users: true
      require_verified_email: false
      allowed_email_domains: []
