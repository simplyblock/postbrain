{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "postbrain.fullname" . }}
  labels:
    {{- include "postbrain.labels" . | nindent 4 }}
spec:
  {{- if .Values.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- else if .Values.gateway.enabled }}
  parentRefs:
    - name: {{ include "postbrain.gatewayName" . }}
  {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.pathPrefix | quote }}
      backendRefs:
        - name: {{ include "postbrain.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
