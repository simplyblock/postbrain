name: postbrain-server
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: default
priority: optional
maintainer: Simplyblock <opensource@simplyblock.io>
description: Postbrain server
vendor: Simplyblock
homepage: https://github.com/simplyblock/postbrain
license: Apache-2.0
contents:
  - src: ./dist/linux-${ARCH}/postbrain
    dst: /usr/bin/postbrain
    file_info:
      mode: 0755
  - src: ./config.example.yaml
    dst: /etc/postbrain/config.yaml
    file_info:
      mode: 0644
