name: Build and Package

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g. v1.2.3)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-matrix:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-14
          - goos: darwin
            goarch: arm64
            runner: macos-14
          - goos: windows
            goarch: amd64
            runner: windows-2025
          - goos: windows
            goarch: arm64
            runner: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve build version
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_RELEASE_TAG" ]]; then
            VERSION="$INPUT_RELEASE_TAG"
            VERSION="${VERSION#v}"
          else
            TAG="$(git tag --points-at HEAD | grep -E '^v' | head -n1 || true)"
            if [[ -n "$TAG" ]]; then
              VERSION="${TAG#v}"
            else
              VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build target
        shell: bash
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          CGO_ENABLED=1 make build-target GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} VERSION="$VERSION"

      - name: Package target archives
        shell: bash
        run: |
          make package-target GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/${{ matrix.goos }}-${{ matrix.goarch }}/**
            dist/postbrain-server_${{ matrix.goos }}_${{ matrix.goarch }}.*
            dist/postbrain-client_${{ matrix.goos }}_${{ matrix.goarch }}.*
          if-no-files-found: error

  merge-and-package:
    name: Merge and Package
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    needs:
      - build-matrix
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Download matrix artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          merge-multiple: true
          path: collected

      - name: Merge artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts dist
          find collected -type f \( -name 'postbrain-server_*' -o -name 'postbrain-client_*' \) -exec cp {} release-artifacts/ \;

          for arch in amd64 arm64; do
            server_archive="$(find collected -type f -name "postbrain-server_linux_${arch}.tar.gz" | head -n1)"
            client_archive="$(find collected -type f -name "postbrain-client_linux_${arch}.tar.gz" | head -n1)"

            if [[ -z "$server_archive" || -z "$client_archive" ]]; then
              echo "missing Linux archives for ${arch}: server='${server_archive}' client='${client_archive}'" >&2
              exit 1
            fi

            mkdir -p "dist/linux-${arch}"
            tar -xzf "$server_archive" -C "dist/linux-${arch}"
            tar -xzf "$client_archive" -C "dist/linux-${arch}"
          done

      - name: Install nfpm
        shell: bash
        run: |
          GOBIN="$RUNNER_TEMP/bin" go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.3
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Resolve package version
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_RELEASE_TAG" ]]; then
            TAG="$INPUT_RELEASE_TAG"
            if [[ "$TAG" != v* ]]; then
              TAG="v${TAG}"
            fi
            VERSION="${TAG#v}"
            RELEASE_TAG="$TAG"
          else
            TAG="$(git tag --points-at HEAD | grep -E '^v' | head -n1 || true)"
            if [[ -n "$TAG" ]]; then
              VERSION="${TAG#v}"
              RELEASE_TAG="$TAG"
            else
              VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
              RELEASE_TAG=""
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build deb/rpm packages
        shell: bash
        run: |
          VERSION="${{ steps.vars.outputs.version }}"

          for arch in amd64 arm64; do
            sed "s|\${ARCH}|$arch|g; s|\${VERSION}|$VERSION|g" \
              packaging/nfpm/postbrain-server.yaml > "$RUNNER_TEMP/postbrain-server-$arch.yaml"
            sed "s|\${ARCH}|$arch|g; s|\${VERSION}|$VERSION|g" \
              packaging/nfpm/postbrain-client.yaml > "$RUNNER_TEMP/postbrain-client-$arch.yaml"

            nfpm pkg -f "$RUNNER_TEMP/postbrain-server-$arch.yaml" -p deb \
              --target "release-artifacts/postbrain-server_${VERSION}_linux_${arch}.deb"
            nfpm pkg -f "$RUNNER_TEMP/postbrain-server-$arch.yaml" -p rpm \
              --target "release-artifacts/postbrain-server_${VERSION}_linux_${arch}.rpm"
            nfpm pkg -f "$RUNNER_TEMP/postbrain-client-$arch.yaml" -p deb \
              --target "release-artifacts/postbrain-client_${VERSION}_linux_${arch}.deb"
            nfpm pkg -f "$RUNNER_TEMP/postbrain-client-$arch.yaml" -p rpm \
              --target "release-artifacts/postbrain-client_${VERSION}_linux_${arch}.rpm"
          done

      - name: Generate checksums
        shell: bash
        run: |
          (cd release-artifacts && sha256sum * > checksums.txt)

      - name: Upload merged release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts/**

  release:
    name: Release
    runs-on: ubuntu-24.04
    needs:
      - merge-and-package
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && needs.merge-and-package.outputs.release_tag != '') }}
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.merge-and-package.outputs.release_tag }}
          target_commitish: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          files: release-artifacts/*

  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-24.04
    needs:
      - merge-and-package
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Prepare Docker build artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/linux-amd64 dist/linux-arm64
          tar -xzf release-artifacts/postbrain-server_linux_amd64.tar.gz -C dist/linux-amd64
          tar -xzf release-artifacts/postbrain-server_linux_arm64.tar.gz -C dist/linux-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker tags
        id: docker_tags
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          IMAGE="simplyblock/postbrain"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          TAGS=("${IMAGE}:sha-${SHORT_SHA}")

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_RELEASE_TAG" ]]; then
            TAG="$INPUT_RELEASE_TAG"
            if [[ "$TAG" != v* ]]; then
              TAG="v${TAG}"
            fi
          else
            TAG="$(git tag --points-at HEAD | grep -E '^v' | head -n1 || true)"
          fi

          if [[ -n "${TAG}" ]]; then
            VERSION="${TAG#v}"
            TAGS+=("${IMAGE}:${VERSION}" "${IMAGE}:${TAG}")
          fi

          if [[ "$EVENT_NAME" == "workflow_run" && "$WORKFLOW_HEAD_BRANCH" == "main" ]]; then
            TAGS+=("${IMAGE}:latest")
          fi

          {
            echo "tags<<EOF"
            printf "%s\n" "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.release
          build-args: |
            GOPLS_VERSION=v0.21.1
            MARKITDOWN_VERSION=0.1.5
            TSGO_VERSION=latest
            TYPESCRIPT_VERSION=latest
            TYPESCRIPT_LANGUAGE_SERVER_VERSION=latest
            PYRIGHT_VERSION=latest
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker_tags.outputs.tags }}

  docs-pages-build:
    name: Build Docs Site
    runs-on: ubuntu-24.04
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: site
        run: npm install

      - name: Build Astro docs site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  docs-pages-deploy:
    name: Deploy Docs Site
    runs-on: ubuntu-24.04
    needs:
      - docs-pages-build
    if: ${{ needs.docs-pages-build.result == 'success' }}
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
