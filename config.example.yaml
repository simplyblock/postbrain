database:
  url:             "postgres://postbrain:postbrain@localhost:5432/postbrain"
  auto_migrate:    true
  max_open:        25
  max_idle:        5
  connect_timeout: 10s

embedding:
  backend:         ollama
  ollama_url:      "http://localhost:11434"
  text_model:      "nomic-embed-text"
  code_model:      "nomic-embed-code"
  openai_api_key:  ""
  request_timeout: 30s
  batch_size:      64

server:
  addr:     ":7433"
  token:    "changeme"
  tls_cert: ""
  tls_key:  ""

migrations:
  expected_version: 0

jobs:
  consolidation_enabled: true
  contradiction_enabled: true
  reembed_enabled:       true
  age_check_enabled:     true
  backfill_summaries_enabled: true

oauth:
  base_url: "https://postbrain.example.com"
  providers:
    github:
      enabled: true
      client_id: "Iv1.abc123"
      client_secret: "ghsec_..."
      scopes: ["read:user", "user:email"]

    google:
      enabled: false
      client_id: ""
      client_secret: ""
      scopes: ["openid", "email", "profile"]

    gitlab:
      enabled: false
      client_id: ""
      client_secret: ""
      instance_url: "https://gitlab.com"
      scopes: ["read_user"]

  server:
    auth_code_ttl: 10m
    state_ttl: 15m
    token_ttl: 0
    dynamic_registration: true
