database:
  # PostgreSQL DSN used by Postbrain.
  url: "postgres://postbrain:postbrain@localhost:5432/postbrain"
  # Apply pending migrations on startup.
  auto_migrate: true
  # Maximum number of open database connections.
  max_open: 25
  # Maximum number of idle database connections.
  max_idle: 5
  # Timeout for initial database connection attempts.
  connect_timeout: 10s

embedding:
  # Named embedding runtime profiles.
  # Startup embedding/summarization uses providers.default.
  # Model registration can reference these via --provider-config.
  providers:
    default:
      # Runtime backend for this profile (ollama or openai).
      backend: ollama
      # Endpoint base URL for this profile.
      service_url: "http://localhost:11434"
      # Optional OpenAI API key for this profile (usually empty for ollama).
      api_key: ""
      # Model slug for text embeddings.
      text_model: "nomic-embed-text"
      # Model slug for code embeddings.
      code_model: "nomic-embed-code"
      # Optional model slug for summarize/analyze generation.
      summary_model: ""
    openai-prod:
      # Example second profile using hosted OpenAI.
      backend: openai
      # OpenAI-compatible endpoint for this profile.
      service_url: "https://api.openai.com/v1"
      # API key used when this profile is selected.
      api_key: ""
      # Provider-specific model slugs.
      text_model: "text-embedding-3-small"
      code_model: ""
      summary_model: ""
  # Timeout for embedding/summarize/analyze requests.
  request_timeout: 30s
  # Batch size used for embedding jobs.
  batch_size: 64

server:
  # HTTP listen address for REST/MCP/UI.
  addr: ":7433"
  # Optional TLS certificate path (enables HTTPS when set with tls_key).
  tls_cert: ""
  # Optional TLS private key path (enables HTTPS when set with tls_cert).
  tls_key: ""

migrations:
  # Expected schema version guard (0 disables strict version pinning).
  expected_version: 0

jobs:
  # Enable memory consolidation/summarization scheduler.
  consolidation_enabled: true
  # Enable contradiction detection scheduler.
  contradiction_enabled: true
  # Enable embedding refresh scheduler.
  reembed_enabled: true
  # Enable age/staleness check scheduler.
  age_check_enabled: true
  # Enable backfill of artifact summaries.
  backfill_summaries_enabled: true
  # Enable backfill of chunk memories/entities for legacy records.
  chunk_backfill_enabled: false

oauth:
  # Public base URL used for OAuth endpoints and callbacks.
  base_url: "https://postbrain.example.com"
  providers:
    github:
      # Enable GitHub social login.
      enabled: true
      # GitHub OAuth app client ID.
      client_id: "Iv1.abc123"
      # GitHub OAuth app client secret.
      client_secret: "ghsec_..."
      # Requested GitHub scopes.
      scopes: ["read:user", "user:email"]

    google:
      # Enable Google social login.
      enabled: false
      # Google OAuth client ID.
      client_id: ""
      # Google OAuth client secret.
      client_secret: ""
      # Requested Google scopes.
      scopes: ["openid", "email", "profile"]

    gitlab:
      # Enable GitLab social login.
      enabled: false
      # GitLab OAuth client ID.
      client_id: ""
      # GitLab OAuth client secret.
      client_secret: ""
      # GitLab instance URL (gitlab.com or self-hosted).
      instance_url: "https://gitlab.com"
      # Requested GitLab scopes.
      scopes: ["read_user"]

  server:
    # Authorization code lifetime.
    auth_code_ttl: 10m
    # OAuth state lifetime.
    state_ttl: 15m
    # Issued token lifetime (0 means non-expiring under current behavior).
    token_ttl: 0
    # Allow dynamic OAuth client registration endpoint.
    dynamic_registration: true

  social:
    # Automatically create a new principal for first-time social logins.
    auto_create_users: true
    # Require provider-verified email before linking or creating a principal.
    require_verified_email: false
    # Optional allowlist of email domains permitted for social login.
    # Empty means all domains are allowed.
    allowed_email_domains: []
