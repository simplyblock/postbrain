{{define "staleness"}}
<h1>Staleness Flags</h1>
<table>
  <thead><tr><th>Artifact ID</th><th>Signal</th><th>Status</th><th>Detected</th></tr></thead>
  <tbody>
  {{range .Flags}}
  <tr>
    <td><a href="/ui/{{$.ScopeID}}/knowledge/{{.ArtifactID}}" class="mono">{{.ArtifactID}}</a></td>
    <td><code>{{.Signal}}</code></td>
    <td><span class="badge badge-warn">{{.Status}}</span></td>
    <td class="muted">{{timeAgo .FlaggedAt}}</td>
  </tr>
  {{else}}
  <tr><td colspan="4" class="muted">No open staleness flags.</td></tr>
  {{end}}
  </tbody>
</table>
{{end}}
