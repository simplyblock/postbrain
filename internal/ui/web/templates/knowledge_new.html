{{define "knowledge_new"}}
<h1>New Knowledge Article</h1>
{{if .FormError}}<div class="alert alert-error">{{.FormError}}</div>{{end}}
<form method="POST" action="/ui/{{.ScopeID}}/knowledge">
  <input type="hidden" name="scope_id" value="{{.ScopeID}}">
  <label>Title (required)<br>
    <input type="text" name="title" style="width:100%;max-width:40rem" autofocus>
  </label>
  <br><br>
  <label>Visibility<br>
    <select name="visibility">
      <option value="team">team</option>
      <option value="public">public</option>
      <option value="private">private</option>
    </select>
  </label>
  <br><br>
  <label>Artifact Kind<br>
    <select name="artifact_kind">
      {{range .ArtifactKinds}}
      <option value="{{.}}">{{.}}</option>
      {{end}}
    </select>
  </label>
  <br><br>
  <label>Content<br>
    <textarea name="content" rows="12" style="width:100%;max-width:60rem"></textarea>
  </label>
  <br><br>
  <button type="submit">Create Article</button>
  <a href="/ui/{{.ScopeID}}/knowledge" style="margin-left:1rem">Cancel</a>
</form>
{{end}}
