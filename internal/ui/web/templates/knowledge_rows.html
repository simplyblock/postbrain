{{define "knowledge_rows"}}
<table>
  <thead><tr><th>Title</th><th>Status</th><th>Endorsements</th><th>Updated</th><th>Actions</th></tr></thead>
  <tbody>
  {{range .Artifacts}}
  <tr>
    <td>
      <a href="/ui/knowledge/{{.ID}}">{{.Title}}</a>
      {{if eq .KnowledgeType "digest"}}<span class="badge badge-info" style="margin-left:0.4rem;font-size:0.7rem">digest</span>{{end}}
    </td>
    <td><span class="badge {{statusBadge .Status}}">{{.Status}}</span></td>
    <td>{{.EndorsementCount}}</td>
    <td>{{timeAgo .UpdatedAt}}</td>
    <td>
      {{if eq .Status "in_review"}}
      <form method="POST" action="/ui/knowledge/{{.ID}}/endorse" style="display:inline">
        <button type="submit">Endorse</button>
      </form>
      {{end}}
    </td>
  </tr>
  {{else}}
  <tr><td colspan="5">No artifacts found.</td></tr>
  {{end}}
  </tbody>
</table>
{{end}}
