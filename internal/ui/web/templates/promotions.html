{{define "promotions"}}
<h1>Promotion Queue</h1>
<form class="toolbar" method="GET" action="/ui/{{.ScopeID}}/promotions">
  <select name="status">
    <option value="all"{{if eq .Status "all"}} selected{{end}}>All statuses</option>
    <option value="pending"{{if eq .Status "pending"}} selected{{end}}>pending</option>
    <option value="approved"{{if eq .Status "approved"}} selected{{end}}>approved</option>
    <option value="rejected"{{if eq .Status "rejected"}} selected{{end}}>rejected</option>
    <option value="merged"{{if eq .Status "merged"}} selected{{end}}>merged</option>
  </select>
  <button type="submit">Filter</button>
</form>
<table>
  <thead>
    <tr><th>Memory ID</th><th>Target Scope</th><th>Proposed Title</th><th>Status</th><th>Requested</th><th>Actions</th></tr>
  </thead>
  <tbody>
  {{range .Promotions}}
  <tr>
    <td><a href="/ui/{{$.ScopeID}}/memories/{{.MemoryID}}" class="mono">{{.MemoryID}}</a></td>
    <td class="mono">{{.TargetScopeID}}</td>
    <td>{{deref .ProposedTitle}}</td>
    <td><span class="badge {{statusBadge .Status}}">{{.Status}}</span></td>
    <td class="muted">{{timeAgo .CreatedAt}}</td>
    <td>
      {{if eq .Status "pending"}}
      <div class="actions">
        <form method="POST" action="/ui/{{$.ScopeID}}/promotions/{{.ID}}/approve" style="display:inline"
              onsubmit="return confirm('Approve this promotion?')">
          <button type="submit" class="btn-sm">Approve</button>
        </form>
        <form method="POST" action="/ui/{{$.ScopeID}}/promotions/{{.ID}}/reject" style="display:inline"
              onsubmit="return confirm('Reject this promotion?')">
          <button type="submit" class="danger btn-sm">Reject</button>
        </form>
      </div>
      {{end}}
    </td>
  </tr>
  {{else}}
  <tr><td colspan="6" class="muted">No pending promotions.</td></tr>
  {{end}}
  </tbody>
</table>
{{end}}
