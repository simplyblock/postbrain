{{define "login"}}
<h1>Sign in to Postbrain</h1>
<form method="POST" action="/ui/login">
  <label>Bearer Token<input type="password" name="token" required autofocus></label>
  <button type="submit">Sign in</button>
  {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
</form>
{{end}}
