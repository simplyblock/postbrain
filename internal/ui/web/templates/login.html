{{define "login"}}
<section class="auth-card">
<h1>Sign in to Postbrain</h1>
{{if .Providers}}
<section>
  <h2>Social Login</h2>
  <div class="auth-social-links">
    {{range .Providers}}
    <a class="btn secondary" href="/ui/auth/{{.}}">Login with {{.}}</a>
    {{end}}
  </div>
</section>
{{end}}
<section>
  <h2>Bearer Token</h2>
<form method="POST" action="/ui/login" class="auth-form">
  {{if .Next}}<input type="hidden" name="next" value="{{.Next}}">{{end}}
  <label>Bearer Token<input type="password" name="token" required autofocus></label>
  <button type="submit">Sign in</button>
  {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
</form>
</section>
</section>
{{end}}
