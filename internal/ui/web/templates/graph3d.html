{{define "graph3d"}}
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
  <h1 style="margin:0">Entity Graph 3D</h1>
  <div style="display:flex;gap:0.75rem;align-items:center">
    <a role="button" class="secondary" href="/ui/graph{{if .ScopeID}}?scope_id={{.ScopeID}}{{end}}" style="margin:0">Open 2D View</a>
    <form class="toolbar" method="GET" action="/ui/graph3d" style="margin:0">
      <select name="scope_id" onchange="this.form.submit()">
        {{range .Scopes}}
        <option value="{{.ID}}"{{if eq $.ScopeID (printf "%s" .ID)}} selected{{end}}>{{.Kind}}:{{.ExternalID}} — {{.Name}}</option>
        {{end}}
      </select>
    </form>
  </div>
</div>
<p class="muted">{{.NodeCount}} entities · {{.EdgeCount}} relations</p>

<div id="graph3d-container" style="width:100%;height:72vh;border:1px solid var(--border);border-radius:var(--border-radius);overflow:hidden;background:var(--card-background-color);position:relative"></div>

<script src="https://unpkg.com/3d-force-graph"></script>
<script>
(function () {
  const raw = {{.GraphJSON}};
  if (!raw || !raw.nodes || raw.nodes.length === 0) return;

  const container = document.getElementById("graph3d-container");
  const graph = ForceGraph3D()(container)
    .graphData(raw)
    .nodeLabel(n => `${n.name} (${n.type})`)
    .nodeAutoColorBy("type")
    .linkLabel(l => l.predicate)
    .linkOpacity(0.45)
    .linkWidth(l => l.predicate === "same_as" ? 2.6 : 1.2)
    .linkDirectionalParticles(1)
    .linkDirectionalParticleWidth(1.2)
    .linkDirectionalParticleSpeed(0.003)
    .backgroundColor("#0b1020");

  // Keep user interaction constrained to rotate + zoom.
  const controls = graph.controls();
  controls.enablePan = false;
  controls.enableRotate = true;
  controls.enableZoom = true;

  function centerGraphAtOrigin() {
    const g = graph.graphData();
    if (!g || !g.nodes || g.nodes.length === 0) return;

    let minX = Infinity, minY = Infinity, minZ = Infinity;
    let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
    for (const n of g.nodes) {
      if (!Number.isFinite(n.x) || !Number.isFinite(n.y) || !Number.isFinite(n.z)) continue;
      if (n.x < minX) minX = n.x;
      if (n.y < minY) minY = n.y;
      if (n.z < minZ) minZ = n.z;
      if (n.x > maxX) maxX = n.x;
      if (n.y > maxY) maxY = n.y;
      if (n.z > maxZ) maxZ = n.z;
    }
    if (!Number.isFinite(minX)) return;

    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    const cz = (minZ + maxZ) / 2;

    for (const n of g.nodes) {
      if (!Number.isFinite(n.x) || !Number.isFinite(n.y) || !Number.isFinite(n.z)) continue;
      n.x -= cx; n.y -= cy; n.z -= cz;
      if (Number.isFinite(n.fx)) n.fx -= cx;
      if (Number.isFinite(n.fy)) n.fy -= cy;
      if (Number.isFinite(n.fz)) n.fz -= cz;
    }
    controls.target.set(0, 0, 0);
    controls.update();
    graph.refresh();
  }

  // Keep the camera readable for small and large graphs.
  graph.d3Force("charge").strength(-180);
  graph.d3Force("link").distance(l => l.predicate === "same_as" ? 22 : 95);
  graph.d3Force("x", d3.forceX(0).strength(0.06));
  graph.d3Force("y", d3.forceY(0).strength(0.06));
  graph.d3Force("z", d3.forceZ(0).strength(0.06));
  graph.cooldownTicks(140);
  graph.onEngineStop(() => {
    // Rebase node coordinates around origin, then fit camera around centered graph.
    centerGraphAtOrigin();
    graph.zoomToFit(800, 40);
  });
  // Also perform an early fit for fast visual feedback on first render.
  setTimeout(() => {
    controls.target.set(0, 0, 0);
    controls.update();
    graph.zoomToFit(250, 60);
  }, 200);
})();
</script>
{{end}}
