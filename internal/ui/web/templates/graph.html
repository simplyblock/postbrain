{{define "graph"}}
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
  <h1 style="margin:0">Entity Graph</h1>
  <a role="button" class="secondary" href="/ui/{{.ScopeID}}/graph3d" style="margin:0">Open 3D View</a>
</div>
<p class="muted">{{.NodeCount}} entities · {{.EdgeCount}} relations</p>

<div id="graph-container" style="width:100%;height:72vh;border:1px solid var(--border);border-radius:var(--border-radius);overflow:hidden;background:var(--card-background-color);position:relative"></div>

<div id="tooltip" style="position:fixed;display:none;background:var(--card-background-color);border:1px solid var(--border);border-radius:var(--border-radius);padding:0.4rem 0.7rem;font-size:0.85rem;pointer-events:none;z-index:100;max-width:220px"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function () {
  const raw = {{.GraphJSON}};
  if (!raw || !raw.nodes || raw.nodes.length === 0) return;

  const nodes = raw.nodes.map(d => ({...d}));
  const links = raw.links.map(d => ({...d}));

  // ── colour by entity type ──────────────────────────────────
  const types = [...new Set(nodes.map(n => n.type))].sort();
  const palette = d3.schemeTableau10;
  const typeColour = t => palette[types.indexOf(t) % palette.length];

  // ── canvas setup ──────────────────────────────────────────
  const container = document.getElementById("graph-container");
  const W = container.clientWidth, H = container.clientHeight;

  const canvas = d3.select(container).append("canvas")
    .attr("width", W).attr("height", H)
    .style("display", "block");
  const ctx = canvas.node().getContext("2d");

  // ── zoom / pan ─────────────────────────────────────────────
  let transform = d3.zoomIdentity;
  canvas.call(
    d3.zoom().scaleExtent([0.1, 8])
      .on("zoom", e => { transform = e.transform; draw(); })
  );

  // ── simulation ────────────────────────────────────────────
  const sim = d3.forceSimulation(nodes)
    .force("link",   d3.forceLink(links).id(d => d.id)
      .distance(d => d.predicate === "same_as" ? 15 : 90)
      .strength(d  => d.predicate === "same_as" ? 1.0 : 0.4))
    .force("charge", d3.forceManyBody().strength(-200))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("x",      d3.forceX(W / 2).strength(0.04))
    .force("y",      d3.forceY(H / 2).strength(0.04))
    .force("collide",d3.forceCollide(22))
    .on("tick", draw);

  const NODE_R = 10;
  const SHOW_EDGE_LABELS = links.length < 200;

  // ── draw helpers ──────────────────────────────────────────
  function drawArrow(x1, y1, x2, y2, colour, dashed) {
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const tx = x2 - NODE_R * Math.cos(angle);
    const ty = y2 - NODE_R * Math.sin(angle);

    ctx.beginPath();
    if (dashed) ctx.setLineDash([5, 3]); else ctx.setLineDash([]);
    ctx.moveTo(x1, y1);
    ctx.lineTo(tx, ty);
    ctx.strokeStyle = colour;
    ctx.lineWidth = dashed ? 2 : 1.5;
    ctx.stroke();
    ctx.setLineDash([]);

    // arrowhead
    const ah = 7;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx - ah * Math.cos(angle - Math.PI / 6), ty - ah * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(tx - ah * Math.cos(angle + Math.PI / 6), ty - ah * Math.sin(angle + Math.PI / 6));
    ctx.closePath();
    ctx.fillStyle = colour;
    ctx.fill();
  }

  function draw() {
    ctx.save();
    ctx.clearRect(0, 0, W, H);
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);

    // edges
    links.forEach(l => {
      const sx = l.source.x, sy = l.source.y;
      const tx = l.target.x, ty = l.target.y;
      const isSameAs = l.predicate === "same_as";
      drawArrow(sx, sy, tx, ty, isSameAs ? "#f80" : "#999", isSameAs);
    });

    // edge labels
    if (SHOW_EDGE_LABELS) {
      ctx.font = "9px sans-serif";
      ctx.fillStyle = "#888";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      links.forEach(l => {
        ctx.fillText(l.predicate,
          (l.source.x + l.target.x) / 2,
          (l.source.y + l.target.y) / 2);
      });
    }

    // nodes
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, NODE_R, 0, 2 * Math.PI);
      ctx.fillStyle = typeColour(n.type);
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    // node labels
    ctx.font = "11px sans-serif";
    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue("color") || "#333";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    nodes.forEach(n => {
      const label = n.name.length > 22 ? n.name.slice(0, 20) + "…" : n.name;
      ctx.fillText(label, n.x + 13, n.y);
    });

    // legend (fixed in screen space — restore first)
    ctx.restore();
    drawLegend();
    return; // skip second restore
  }

  function drawLegend() {
    const x0 = 14, y0 = 14, rowH = 18;
    types.forEach((t, i) => {
      const y = y0 + i * rowH;
      ctx.beginPath();
      ctx.arc(x0 + 6, y + 6, 6, 0, 2 * Math.PI);
      ctx.fillStyle = palette[i % palette.length];
      ctx.fill();
      ctx.font = "11px sans-serif";
      ctx.fillStyle = getComputedStyle(document.body).getPropertyValue("color") || "#333";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(t, x0 + 16, y + 7);
    });
  }

  // ── drag ──────────────────────────────────────────────────
  function findNode(ex, ey) {
    const [wx, wy] = transform.invert([ex, ey]);
    return nodes.find(n => Math.hypot(n.x - wx, n.y - wy) < NODE_R + 4);
  }

  canvas.call(
    d3.drag()
      .subject(event => findNode(event.x, event.y) || null)
      .on("start", (event) => {
        if (!event.active) sim.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
      })
      .on("drag", (event) => {
        const [wx, wy] = transform.invert([event.x, event.y]);
        event.subject.fx = wx;
        event.subject.fy = wy;
      })
      .on("end", (event) => {
        if (!event.active) sim.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
      })
  );

  // ── tooltip ───────────────────────────────────────────────
  const tooltip = document.getElementById("tooltip");
  canvas.on("mousemove", function (event) {
    const [ex, ey] = d3.pointer(event);
    const n = findNode(ex, ey);
    if (n) {
      tooltip.style.display = "block";
      tooltip.style.left = (event.clientX + 14) + "px";
      tooltip.style.top  = (event.clientY - 28) + "px";
      // Build tooltip with DOM API so n.name and n.type (user-controlled entity
      // metadata) are set via textContent and never parsed as HTML markup.
      tooltip.replaceChildren();
      var nameEl = document.createElement("strong");
      nameEl.textContent = n.name;
      tooltip.appendChild(nameEl);
      tooltip.appendChild(document.createElement("br"));
      var typeEl = document.createElement("span");
      typeEl.style.opacity = "0.7";
      typeEl.textContent = n.type;
      tooltip.appendChild(typeEl);
    } else {
      tooltip.style.display = "none";
    }
  });
  canvas.on("mouseleave", () => { tooltip.style.display = "none"; });
})();
</script>
{{end}}
