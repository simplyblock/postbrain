{{define "memories"}}
<h1>Memories</h1>
<form hx-get="/ui/memories" hx-target="#results" hx-push-url="true">
  <input type="text" name="q" placeholder="Search…" value="{{.Query}}">
  <input type="text" name="scope_id" placeholder="Scope ID" value="{{.ScopeID}}">
  <button type="submit">Search</button>
</form>
<div id="results">
{{template "memories_rows" .}}
</div>
{{end}}
