{{define "memories"}}
<h1>Memories</h1>
<form class="toolbar" hx-get="/ui/{{.ScopeID}}/memories" hx-target="#results" hx-push-url="true">
  <input type="text" name="q" placeholder="Search…" value="{{.Query}}">
  <button type="submit">Search</button>
</form>
<div id="results">
{{template "memories_rows" .}}
</div>
{{end}}
