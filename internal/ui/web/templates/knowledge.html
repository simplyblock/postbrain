{{define "knowledge"}}
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
  <h1 style="margin:0">Knowledge</h1>
  <button onclick="document.getElementById('dlg-upload').showModal()">+ Upload Document</button>
</div>

<form class="toolbar" hx-get="/ui/knowledge" hx-target="#results" hx-push-url="true">
  <input type="text" name="q" placeholder="Search…" value="{{.Query}}">
  <select name="status">
    <option value=""{{if eq .Status ""}} selected{{end}}>All statuses</option>
    <option{{if eq .Status "draft"}} selected{{end}}>draft</option>
    <option{{if eq .Status "in_review"}} selected{{end}}>in_review</option>
    <option{{if eq .Status "published"}} selected{{end}}>published</option>
    <option{{if eq .Status "deprecated"}} selected{{end}}>deprecated</option>
  </select>
  <button type="submit">Search</button>
</form>
<div id="results">{{template "knowledge_rows" .}}</div>

<!-- ── Dialog: Upload Document ────────────────────────────── -->
<dialog id="dlg-upload">
  <h2>Upload Document</h2>
  {{if .UploadError}}<div class="alert alert-error">{{.UploadError}}</div>{{end}}
  <form method="POST" action="/ui/knowledge/upload" enctype="multipart/form-data">
    <label>File (.txt, .md, .pdf, .docx, .pptx, .xlsx, .xls, .png, .jpg, .jpeg, .gif, .bmp, .webp)
      <input type="file" name="file" accept=".txt,.md,.pdf,.docx,.pptx,.xlsx,.xls,.png,.jpg,.jpeg,.gif,.bmp,.webp" required>
    </label>
    <label>Scope
      <select name="scope" required>
        <option value="">— select scope —</option>
        {{range .Scopes}}
        <option value="{{.Kind}}:{{.ExternalID}}">{{.Kind}}:{{.ExternalID}} — {{.Name}}</option>
        {{end}}
      </select>
    </label>
    <label>Title (optional)
      <input type="text" name="title" placeholder="defaults to filename">
    </label>
    <label>Type
      <select name="knowledge_type">
        <option value="reference">reference</option>
        <option value="semantic">semantic</option>
        <option value="episodic">episodic</option>
        <option value="procedural">procedural</option>
      </select>
    </label>
    <label>After upload
      <select name="workflow">
        <option value="draft">Save as draft</option>
        <option value="review">Submit for review</option>
        <option value="publish">Publish immediately</option>
      </select>
    </label>
    <div class="dialog-footer">
      <button type="button" class="secondary" onclick="document.getElementById('dlg-upload').close()">Cancel</button>
      <button type="submit">Upload</button>
    </div>
  </form>
</dialog>

{{if .UploadError}}<script>document.getElementById('dlg-upload').showModal()</script>{{end}}
{{end}}
