{{define "collections"}}
<h1>Collections</h1>
<table>
  <thead><tr><th>Name</th><th>Slug</th><th>Visibility</th><th>Created</th></tr></thead>
  <tbody>
  {{range .Collections}}
  <tr>
    <td><a href="/ui/collections/{{.ID}}">{{.Name}}</a></td>
    <td>{{.Slug}}</td>
    <td>{{.Visibility}}</td>
    <td>{{timeAgo .CreatedAt}}</td>
  </tr>
  {{else}}
  <tr><td colspan="4">No collections.</td></tr>
  {{end}}
  </tbody>
</table>
{{end}}
