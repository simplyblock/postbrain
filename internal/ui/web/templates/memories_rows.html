{{define "memories_rows"}}
<table>
  <thead><tr><th>Type</th><th>Importance</th><th>Content</th><th>Age</th><th>Actions</th></tr></thead>
  <tbody>
  {{range .Memories}}
  <tr>
    <td>{{.MemoryType}}</td>
    <td>{{printf "%.2f" .Importance}}</td>
    <td><a href="/ui/{{$.ScopeID}}/memories/{{.ID}}">{{truncate .Content 80}}</a></td>
    <td>{{timeAgo .CreatedAt}}</td>
    <td>
      <button hx-delete="/v1/memories/{{.ID}}" hx-confirm="Soft-delete this memory?" hx-target="closest tr" hx-swap="outerHTML">Delete</button>
    </td>
  </tr>
  {{else}}
  <tr><td colspan="5">No memories found.</td></tr>
  {{end}}
  </tbody>
</table>
{{if .NextCursor}}<button hx-get="/ui/{{.ScopeID}}/memories?cursor={{.NextCursor}}&q={{.Query}}" hx-target="#results" hx-swap="beforeend">Load more</button>{{end}}
{{end}}
